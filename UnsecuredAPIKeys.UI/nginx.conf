events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml
        application/javascript
        application/json;

    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Serve static assets with caching
        location /_next/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Handle Next.js static export with trailing slashes
        location / {
            try_files $uri $uri/index.html $uri/ /404/index.html;
        }

        # Handle specific routes with trailing slashes
        location ~ ^/(about|donated|leaderboard|pricing)/$ {
            try_files $uri/index.html /404/index.html;
        }

        # Serve favicon
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Error page
        error_page 404 /404/index.html;
    }
}